[build]
builder = "NIXPACKS"
buildCommand = "if [ -f go.mod ]; then go mod download && go build -o bin/migration-job ./cmd/migration-job/main.go; else cd backend && go mod download && go build -o bin/migration-job ./cmd/migration-job/main.go; fi"

[deploy]
startCommand = "if [ -f ./bin/migration-job ]; then ./bin/migration-job; else cd backend && ./bin/migration-job; fi"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
