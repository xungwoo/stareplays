[build]
builder = "NIXPACKS"
buildCommand = "if [ -f go.mod ]; then go mod download && go build -o bin/ranking-job ./cmd/ranking-job/main.go; else cd backend && go mod download && go build -o bin/ranking-job ./cmd/ranking-job/main.go; fi"

[deploy]
startCommand = "if [ -f ./bin/ranking-job ]; then ./bin/ranking-job; else cd backend && ./bin/ranking-job; fi"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
