[build]
builder = "NIXPACKS"
buildCommand = "if [ -f go.mod ]; then go build -o bin/server ./cmd/server; else cd backend && go build -o bin/server ./cmd/server; fi"

[deploy]
startCommand = "if [ -f ./bin/server ]; then ./bin/server; else cd backend && ./bin/server; fi"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
